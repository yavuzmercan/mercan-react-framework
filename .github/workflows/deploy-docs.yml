name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/ui/**'
      - '.github/workflows/deploy-docs.yml'
  # Manuel tetiklemek için Actions sekmesinden çalıştırılabilir
  workflow_dispatch:

# GitHub Pages deploy izinleri
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda yalnızca tek deploy çalışsın; yeni push gelirse mevcut beklemekte olanlar iptal
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @yavuzmercan/ui
        run: npm run build:packages

      - name: Build docs
        run: npm run build --workspace apps/docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
